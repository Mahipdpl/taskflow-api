<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow — Backend Intern Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    /* ── RESET & BASE ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #0a0a0f;
      --surface:  #13131e;
      --surface2: #1c1c2e;
      --border:   #2a2a42;
      --accent:   #6c63ff;
      --accent2:  #00e5ff;
      --danger:   #ff4f6d;
      --success:  #00c896;
      --warn:     #ffb347;
      --text:     #e8e8f0;
      --muted:    #7878a0;
      --radius:   10px;
      --mono:     'Space Mono', monospace;
      --sans:     'Syne', sans-serif;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); }
    #root { height: 100%; }

    /* ── SCROLLBAR ────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--surface); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── LAYOUT ───────────────────────────────────────────── */
    .app { display: flex; height: 100vh; overflow: hidden; }
    .sidebar {
      width: 240px; min-width: 240px; background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 28px 0;
    }
    .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
    .topbar {
      position: sticky; top: 0; z-index: 10;
      background: rgba(10,10,15,0.85); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .content { padding: 32px; flex: 1; max-width: 1100px; }

    /* ── LOGO ─────────────────────────────────────────────── */
    .logo {
      padding: 0 24px 28px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .logo h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
    .logo h1 span { color: var(--accent); }
    .logo small { color: var(--muted); font-size: 11px; font-family: var(--mono); }

    /* ── NAV ──────────────────────────────────────────────── */
    .nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 24px; cursor: pointer;
      color: var(--muted); font-size: 14px; font-weight: 600;
      transition: all 0.15s; border-left: 3px solid transparent;
      user-select: none;
    }
    .nav-item:hover { color: var(--text); background: rgba(108,99,255,0.08); }
    .nav-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(108,99,255,0.1); }
    .nav-icon { font-size: 18px; width: 20px; text-align: center; }

    .sidebar-footer {
      margin-top: auto; padding: 16px 24px;
      border-top: 1px solid var(--border);
    }
    .user-chip {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px; border-radius: 8px;
      background: var(--surface2);
    }
    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--accent); display: flex; align-items: center;
      justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0;
    }
    .user-info { flex: 1; min-width: 0; }
    .user-name { font-size: 13px; font-weight: 600; truncate: ellipsis; overflow: hidden; white-space: nowrap; }
    .user-role { font-size: 10px; color: var(--muted); font-family: var(--mono); text-transform: uppercase; }

    /* ── AUTH PAGE ────────────────────────────────────────── */
    .auth-page {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: var(--bg);
      background-image: radial-gradient(ellipse at 20% 50%, rgba(108,99,255,0.12) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 20%, rgba(0,229,255,0.08) 0%, transparent 50%);
    }
    .auth-card {
      width: 420px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 16px;
      padding: 40px; animation: fadeUp 0.4s ease;
    }
    .auth-card h2 { font-size: 28px; font-weight: 800; margin-bottom: 6px; }
    .auth-card p  { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
    .auth-toggle  { margin-top: 20px; text-align: center; font-size: 14px; color: var(--muted); }
    .auth-toggle button { color: var(--accent); background: none; border: none; cursor: pointer; font-weight: 600; }

    /* ── FORM ─────────────────────────────────────────────── */
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 12px; font-weight: 700; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 7px; text-transform: uppercase; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 11px 14px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text); font-size: 14px; font-family: var(--sans);
      outline: none; transition: border-color 0.15s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: var(--accent);
    }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    /* ── BUTTONS ──────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 11px 20px; border-radius: var(--radius);
      font-size: 14px; font-weight: 700; cursor: pointer; border: none;
      transition: all 0.15s; user-select: none;
    }
    .btn-primary  { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #8079ff; transform: translateY(-1px); }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }
    .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
    .btn-danger:hover { background: var(--danger); color: #fff; }
    .btn-success { background: var(--success); color: #000; }
    .btn-full { width: 100%; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

    /* ── ALERTS ───────────────────────────────────────────── */
    .alert {
      padding: 12px 16px; border-radius: var(--radius);
      font-size: 13px; margin-bottom: 18px;
      display: flex; align-items: flex-start; gap: 10px;
      animation: fadeIn 0.2s ease;
    }
    .alert-error   { background: rgba(255,79,109,0.12); border: 1px solid rgba(255,79,109,0.3); color: #ff8fa3; }
    .alert-success { background: rgba(0,200,150,0.1); border: 1px solid rgba(0,200,150,0.3); color: var(--success); }
    .alert-info    { background: rgba(0,229,255,0.08); border: 1px solid rgba(0,229,255,0.25); color: var(--accent2); }

    /* ── CARDS ────────────────────────────────────────────── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 24px;
    }
    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .card-title { font-size: 16px; font-weight: 700; }

    /* ── STATS GRID ───────────────────────────────────────── */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 20px; position: relative; overflow: hidden;
    }
    .stat-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    }
    .stat-card.purple::before { background: var(--accent); }
    .stat-card.cyan::before   { background: var(--accent2); }
    .stat-card.green::before  { background: var(--success); }
    .stat-card.orange::before { background: var(--warn); }
    .stat-num { font-size: 32px; font-weight: 800; font-family: var(--mono); }
    .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

    /* ── TASK TABLE ───────────────────────────────────────── */
    .task-list { display: flex; flex-direction: column; gap: 10px; }
    .task-row {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 16px 20px;
      display: flex; align-items: center; gap: 16px;
      transition: border-color 0.15s;
      animation: fadeIn 0.2s ease;
    }
    .task-row:hover { border-color: var(--accent); }
    .task-title { font-size: 15px; font-weight: 600; flex: 1; }
    .task-desc  { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .task-meta  { display: flex; align-items: center; gap: 10px; }

    /* ── BADGES ───────────────────────────────────────────── */
    .badge {
      display: inline-flex; align-items: center;
      padding: 3px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 700; font-family: var(--mono);
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .badge-todo        { background: rgba(120,120,160,0.15); color: var(--muted); border: 1px solid var(--border); }
    .badge-in_progress { background: rgba(255,179,71,0.12); color: var(--warn); border: 1px solid rgba(255,179,71,0.3); }
    .badge-done        { background: rgba(0,200,150,0.12); color: var(--success); border: 1px solid rgba(0,200,150,0.3); }
    .badge-low         { background: rgba(0,229,255,0.08); color: var(--accent2); border: 1px solid rgba(0,229,255,0.2); }
    .badge-medium      { background: rgba(255,179,71,0.1); color: var(--warn); border: 1px solid rgba(255,179,71,0.25); }
    .badge-high        { background: rgba(255,79,109,0.1); color: var(--danger); border: 1px solid rgba(255,79,109,0.25); }
    .badge-admin       { background: rgba(108,99,255,0.15); color: var(--accent); border: 1px solid rgba(108,99,255,0.3); }
    .badge-user        { background: rgba(0,229,255,0.08); color: var(--accent2); border: 1px solid rgba(0,229,255,0.2); }

    /* ── MODAL ────────────────────────────────────────────── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center; z-index: 100;
      animation: fadeIn 0.15s ease;
    }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 32px; width: 500px; max-width: 95vw;
      animation: fadeUp 0.2s ease;
    }
    .modal h3 { font-size: 20px; font-weight: 800; margin-bottom: 24px; }

    /* ── FILTERS ──────────────────────────────────────────── */
    .filters { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .filter-btn {
      padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 700;
      cursor: pointer; border: 1px solid var(--border); background: transparent;
      color: var(--muted); transition: all 0.15s; font-family: var(--mono);
    }
    .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .filter-btn:hover:not(.active) { border-color: var(--muted); color: var(--text); }

    /* ── PAGE HEADER ──────────────────────────────────────── */
    .page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; }
    .page-title  { font-size: 26px; font-weight: 800; }
    .page-sub    { font-size: 14px; color: var(--muted); margin-top: 4px; }

    /* ── EMPTY STATE ──────────────────────────────────────── */
    .empty {
      text-align: center; padding: 60px 20px; color: var(--muted);
    }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty h3 { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 8px; }

    /* ── SPINNER ──────────────────────────────────────────── */
    .spinner {
      width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite;
      display: inline-block;
    }

    /* ── PAGINATION ───────────────────────────────────────── */
    .pagination { display: flex; align-items: center; gap: 10px; margin-top: 20px; justify-content: flex-end; }
    .page-info { font-size: 13px; color: var(--muted); font-family: var(--mono); }

    /* ── TAG ──────────────────────────────────────────────── */
    .tag { font-size: 11px; color: var(--muted); font-family: var(--mono); }

    /* ── ADMIN SECTION ────────────────────────────────────── */
    .section-title { font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; padding: 8px 24px 4px; }

    /* ── ANIMATIONS ───────────────────────────────────────── */
    @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeUp  { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin    { to { transform: rotate(360deg); } }

    /* ── RESPONSIVE ───────────────────────────────────────── */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .content { padding: 20px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useCallback, createContext, useContext } = React;

    // ─── API CONFIG ──────────────────────────────────────────────
    const API_BASE = 'http://localhost:5000/api/v1';

    const api = {
      _req: async (method, path, body, token) => {
        const opts = {
          method,
          headers: { 'Content-Type': 'application/json', ...(token ? { Authorization: `Bearer ${token}` } : {}) },
          ...(body ? { body: JSON.stringify(body) } : {}),
        };
        const res = await fetch(`${API_BASE}${path}`, opts);
        const data = await res.json();
        if (!res.ok) throw { status: res.status, message: data.message || 'Request failed', errors: data.errors };
        return data;
      },
      post:   (path, body, token) => api._req('POST',   path, body, token),
      get:    (path, token)       => api._req('GET',    path, null, token),
      put:    (path, body, token) => api._req('PUT',    path, body, token),
      delete: (path, token)       => api._req('DELETE', path, null, token),
    };

    // ─── AUTH CONTEXT ────────────────────────────────────────────
    const AuthCtx = createContext(null);

    const AuthProvider = ({ children }) => {
      const [user,  setUser]  = useState(null);
      const [token, setToken] = useState(localStorage.getItem('tf_token'));
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        if (token) {
          api.get('/auth/me', token)
            .then(d => setUser(d.data.user))
            .catch(() => { localStorage.removeItem('tf_token'); setToken(null); })
            .finally(() => setLoading(false));
        } else {
          setLoading(false);
        }
      }, [token]);

      const login = async (email, password) => {
        const d = await api.post('/auth/login', { email, password });
        localStorage.setItem('tf_token', d.data.accessToken);
        setToken(d.data.accessToken);
        setUser(d.data.user);
        return d.data.user;
      };

      const register = async (name, email, password) => {
        const d = await api.post('/auth/register', { name, email, password });
        localStorage.setItem('tf_token', d.data.accessToken);
        setToken(d.data.accessToken);
        setUser(d.data.user);
        return d.data.user;
      };

      const logout = () => {
        localStorage.removeItem('tf_token');
        setToken(null);
        setUser(null);
      };

      return (
        <AuthCtx.Provider value={{ user, token, login, register, logout, loading }}>
          {children}
        </AuthCtx.Provider>
      );
    };

    const useAuth = () => useContext(AuthCtx);

    // ─── HELPERS ─────────────────────────────────────────────────
    const Alert = ({ type = 'error', children }) => {
      const icons = { error: '⚠', success: '✓', info: 'ℹ' };
      return (
        <div className={`alert alert-${type}`}>
          <span>{icons[type]}</span>
          <span>{children}</span>
        </div>
      );
    };

    const Spinner = () => <span className="spinner"/>;

    const Badge = ({ type, label }) => <span className={`badge badge-${type}`}>{label || type}</span>;

    const Modal = ({ title, onClose, children }) => (
      <div className="modal-backdrop" onClick={e => e.target === e.currentTarget && onClose()}>
        <div className="modal">
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:24 }}>
            <h3 style={{ margin:0 }}>{title}</h3>
            <button onClick={onClose} style={{ background:'none', border:'none', color:'var(--muted)', fontSize:22, cursor:'pointer' }}>×</button>
          </div>
          {children}
        </div>
      </div>
    );

    // ─── AUTH PAGE ────────────────────────────────────────────────
    const AuthPage = () => {
      const { login, register } = useAuth();
      const [mode, setMode]   = useState('login');
      const [form, setForm]   = useState({ name:'', email:'', password:'' });
      const [err,  setErr]    = useState('');
      const [ok,   setOk]     = useState('');
      const [busy, setBusy]   = useState(false);

      const set = k => e => setForm(f => ({ ...f, [k]: e.target.value }));

      const submit = async () => {
        setErr(''); setOk(''); setBusy(true);
        try {
          if (mode === 'login') {
            await login(form.email, form.password);
          } else {
            await register(form.name, form.email, form.password);
            setOk('Account created! Welcome to TaskFlow.');
          }
        } catch (e) {
          setErr(e.message || 'Something went wrong');
        } finally {
          setBusy(false);
        }
      };

      const demo = (email, password) => {
        setForm(f => ({ ...f, email, password }));
        setMode('login');
      };

      return (
        <div className="auth-page">
          <div className="auth-card">
            <div className="logo" style={{ border:'none', padding:0, marginBottom:24 }}>
              <h1><span>Task</span>Flow</h1>
              <small>Backend Intern Demo API</small>
            </div>
            <h2>{mode === 'login' ? 'Sign in' : 'Create account'}</h2>
            <p>{mode === 'login' ? 'Access your dashboard' : 'Start managing tasks'}</p>

            {err && <Alert type="error">{err}</Alert>}
            {ok  && <Alert type="success">{ok}</Alert>}

            {mode === 'register' && (
              <div className="form-group">
                <label>Full Name</label>
                <input value={form.name} onChange={set('name')} placeholder="Jane Doe"/>
              </div>
            )}
            <div className="form-group">
              <label>Email</label>
              <input type="email" value={form.email} onChange={set('email')} placeholder="you@example.com"/>
            </div>
            <div className="form-group">
              <label>Password</label>
              <input type="password" value={form.password} onChange={set('password')} placeholder="••••••••"
                onKeyDown={e => e.key === 'Enter' && submit()}/>
            </div>

            <button className="btn btn-primary btn-full" onClick={submit} disabled={busy}>
              {busy ? <Spinner/> : (mode === 'login' ? 'Sign in' : 'Register')}
            </button>

            {mode === 'login' && (
              <div style={{ marginTop:16 }}>
                <Alert type="info">
                  Demo credentials — Admin: admin@taskflow.dev / Admin@123
                </Alert>
                <button className="btn btn-ghost btn-full" style={{ marginTop:8 }}
                  onClick={() => demo('admin@taskflow.dev', 'Admin@123')}>
                  Use demo credentials
                </button>
              </div>
            )}

            <div className="auth-toggle">
              {mode === 'login' ? "Don't have an account? " : "Already registered? "}
              <button onClick={() => { setMode(m => m === 'login' ? 'register' : 'login'); setErr(''); }}>
                {mode === 'login' ? 'Register' : 'Sign in'}
              </button>
            </div>
          </div>
        </div>
      );
    };

    // ─── TASK MODAL ───────────────────────────────────────────────
    const TaskModal = ({ task, onClose, onSave, token }) => {
      const [form, setForm] = useState({
        title:       task?.title       || '',
        description: task?.description || '',
        status:      task?.status      || 'todo',
        priority:    task?.priority    || 'medium',
        due_date:    task?.due_date    ? task.due_date.split('T')[0] : '',
      });
      const [err, setErr]   = useState('');
      const [busy, setBusy] = useState(false);

      const set = k => e => setForm(f => ({ ...f, [k]: e.target.value }));

      const save = async () => {
        if (!form.title.trim()) return setErr('Title is required');
        setBusy(true); setErr('');
        try {
          let result;
          if (task) {
            result = await api.put(`/tasks/${task.id}`, form, token);
          } else {
            result = await api.post('/tasks', form, token);
          }
          onSave(result.data.task);
        } catch (e) {
          setErr(e.message);
        } finally {
          setBusy(false);
        }
      };

      return (
        <Modal title={task ? 'Edit Task' : 'New Task'} onClose={onClose}>
          {err && <Alert type="error">{err}</Alert>}
          <div className="form-group">
            <label>Title *</label>
            <input value={form.title} onChange={set('title')} placeholder="What needs to be done?"/>
          </div>
          <div className="form-group">
            <label>Description</label>
            <textarea value={form.description} onChange={set('description')} placeholder="Optional details..."/>
          </div>
          <div className="form-row">
            <div className="form-group">
              <label>Status</label>
              <select value={form.status} onChange={set('status')}>
                <option value="todo">To Do</option>
                <option value="in_progress">In Progress</option>
                <option value="done">Done</option>
              </select>
            </div>
            <div className="form-group">
              <label>Priority</label>
              <select value={form.priority} onChange={set('priority')}>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
              </select>
            </div>
          </div>
          <div className="form-group">
            <label>Due Date</label>
            <input type="date" value={form.due_date} onChange={set('due_date')}/>
          </div>
          <div style={{ display:'flex', gap:10, justifyContent:'flex-end', marginTop:8 }}>
            <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
            <button className="btn btn-primary" onClick={save} disabled={busy}>
              {busy ? <Spinner/> : (task ? 'Save Changes' : 'Create Task')}
            </button>
          </div>
        </Modal>
      );
    };

    // ─── TASKS PAGE ───────────────────────────────────────────────
    const TasksPage = () => {
      const { token, user } = useAuth();
      const [tasks,   setTasks]   = useState([]);
      const [loading, setLoading] = useState(true);
      const [err,     setErr]     = useState('');
      const [modal,   setModal]   = useState(null); // null | 'new' | taskObj
      const [page,    setPage]    = useState(1);
      const [total,   setTotal]   = useState(0);
      const [statusF, setStatusF] = useState('');
      const LIMIT = 10;

      const load = useCallback(async () => {
        setLoading(true); setErr('');
        try {
          const qs = new URLSearchParams({ page, limit: LIMIT, ...(statusF ? { status: statusF } : {}) });
          const d = await api.get(`/tasks?${qs}`, token);
          setTasks(d.data);
          setTotal(d.pagination?.total || 0);
        } catch (e) {
          setErr(e.message);
        } finally {
          setLoading(false);
        }
      }, [token, page, statusF]);

      useEffect(() => { load(); }, [load]);

      const handleSave = (task) => {
        setTasks(ts => {
          const idx = ts.findIndex(t => t.id === task.id);
          if (idx >= 0) { const n = [...ts]; n[idx] = task; return n; }
          return [task, ...ts];
        });
        setModal(null);
        setTotal(t => modal === 'new' ? t + 1 : t);
      };

      const handleDelete = async (id) => {
        if (!confirm('Delete this task?')) return;
        try {
          await api.delete(`/tasks/${id}`, token);
          setTasks(ts => ts.filter(t => t.id !== id));
          setTotal(t => t - 1);
        } catch (e) { setErr(e.message); }
      };

      const pages = Math.ceil(total / LIMIT);

      return (
        <div className="content">
          <div className="page-header">
            <div>
              <div className="page-title">My Tasks</div>
              <div className="page-sub">{total} task{total !== 1 ? 's' : ''} total</div>
            </div>
            <button className="btn btn-primary" onClick={() => setModal('new')}>
              + New Task
            </button>
          </div>

          <div className="filters">
            {['', 'todo', 'in_progress', 'done'].map(s => (
              <button key={s} className={`filter-btn ${statusF === s ? 'active' : ''}`}
                onClick={() => { setStatusF(s); setPage(1); }}>
                {s === '' ? 'All' : s.replace('_',' ')}
              </button>
            ))}
          </div>

          {err     && <Alert type="error">{err}</Alert>}
          {loading && <div style={{ textAlign:'center', padding:40 }}><Spinner/></div>}

          {!loading && tasks.length === 0 && (
            <div className="empty">
              <div className="empty-icon">📋</div>
              <h3>No tasks yet</h3>
              <p style={{ marginBottom:20 }}>Create your first task to get started</p>
              <button className="btn btn-primary" onClick={() => setModal('new')}>Create Task</button>
            </div>
          )}

          <div className="task-list">
            {tasks.map(t => (
              <div key={t.id} className="task-row">
                <div style={{ flex:1 }}>
                  <div className="task-title">{t.title}</div>
                  {t.description && <div className="task-desc">{t.description.slice(0, 80)}{t.description.length > 80 ? '…' : ''}</div>}
                </div>
                <div className="task-meta">
                  <Badge type={t.priority} label={t.priority}/>
                  <Badge type={t.status} label={t.status.replace('_',' ')}/>
                  {t.due_date && <span className="tag">📅 {new Date(t.due_date).toLocaleDateString()}</span>}
                  {user.role === 'admin' && <span className="tag" title="Owner">{t.owner_name}</span>}
                </div>
                <div style={{ display:'flex', gap:8 }}>
                  <button className="btn btn-ghost" style={{ padding:'6px 12px', fontSize:13 }}
                    onClick={() => setModal(t)}>Edit</button>
                  <button className="btn btn-danger" style={{ padding:'6px 12px', fontSize:13 }}
                    onClick={() => handleDelete(t.id)}>Del</button>
                </div>
              </div>
            ))}
          </div>

          {pages > 1 && (
            <div className="pagination">
              <span className="page-info">Page {page} of {pages}</span>
              <button className="btn btn-ghost" disabled={page <= 1} onClick={() => setPage(p => p - 1)}>← Prev</button>
              <button className="btn btn-ghost" disabled={page >= pages} onClick={() => setPage(p => p + 1)}>Next →</button>
            </div>
          )}

          {(modal === 'new' || (modal && typeof modal === 'object')) && (
            <TaskModal
              task={modal === 'new' ? null : modal}
              token={token}
              onClose={() => setModal(null)}
              onSave={handleSave}
            />
          )}
        </div>
      );
    };

    // ─── PROFILE PAGE ─────────────────────────────────────────────
    const ProfilePage = () => {
      const { user, token } = useAuth();
      const [form, setForm]   = useState({ currentPassword:'', newPassword:'' });
      const [err,  setErr]    = useState('');
      const [ok,   setOk]     = useState('');
      const [busy, setBusy]   = useState(false);

      const changePassword = async () => {
        setErr(''); setOk(''); setBusy(true);
        try {
          await api.put('/auth/change-password', form, token);
          setOk('Password changed. You will be logged out.');
          setTimeout(() => window.location.reload(), 1500);
        } catch (e) {
          setErr(e.message);
        } finally {
          setBusy(false);
        }
      };

      return (
        <div className="content">
          <div className="page-header">
            <div className="page-title">Profile</div>
          </div>

          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:20 }}>
            <div className="card">
              <div className="card-header"><span className="card-title">Account Details</span></div>
              <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
                {[['Name', user.name], ['Email', user.email], ['Role', user.role], ['ID', user.id]].map(([k,v]) => (
                  <div key={k}>
                    <div style={{ fontSize:11, color:'var(--muted)', textTransform:'uppercase', marginBottom:4, fontWeight:700 }}>{k}</div>
                    <div style={{ fontSize:14, fontFamily: k==='ID'?'var(--mono)':'inherit', color:'var(--text)' }}>{v}</div>
                  </div>
                ))}
                <div><Badge type={user.role}/></div>
              </div>
            </div>

            <div className="card">
              <div className="card-header"><span className="card-title">Change Password</span></div>
              {err && <Alert type="error">{err}</Alert>}
              {ok  && <Alert type="success">{ok}</Alert>}
              <div className="form-group">
                <label>Current Password</label>
                <input type="password" value={form.currentPassword}
                  onChange={e => setForm(f=>({...f,currentPassword:e.target.value}))}/>
              </div>
              <div className="form-group">
                <label>New Password</label>
                <input type="password" value={form.newPassword}
                  onChange={e => setForm(f=>({...f,newPassword:e.target.value}))}
                  placeholder="Min 8 chars, uppercase+number"/>
              </div>
              <button className="btn btn-primary" onClick={changePassword} disabled={busy}>
                {busy ? <Spinner/> : 'Update Password'}
              </button>
            </div>
          </div>
        </div>
      );
    };

    // ─── ADMIN PAGE ───────────────────────────────────────────────
    const AdminPage = () => {
      const { token } = useAuth();
      const [users,   setUsers]   = useState([]);
      const [loading, setLoading] = useState(true);
      const [err,     setErr]     = useState('');

      useEffect(() => {
        api.get('/users', token)
          .then(d => setUsers(d.data))
          .catch(e => setErr(e.message))
          .finally(() => setLoading(false));
      }, [token]);

      const toggleActive = async (u) => {
        try {
          const r = await api.put(`/users/${u.id}`, { is_active: !u.is_active }, token);
          setUsers(us => us.map(x => x.id === u.id ? r.data.user : x));
        } catch (e) { setErr(e.message); }
      };

      return (
        <div className="content">
          <div className="page-header">
            <div>
              <div className="page-title">User Management</div>
              <div className="page-sub">Admin panel — {users.length} users</div>
            </div>
          </div>

          {err     && <Alert type="error">{err}</Alert>}
          {loading && <div style={{ textAlign:'center', padding:40 }}><Spinner/></div>}

          <div className="task-list">
            {users.map(u => (
              <div key={u.id} className="task-row">
                <div className="avatar">{u.name[0].toUpperCase()}</div>
                <div style={{ flex:1 }}>
                  <div className="task-title">{u.name}</div>
                  <div className="task-desc">{u.email}</div>
                </div>
                <Badge type={u.role}/>
                <span className={`badge ${u.is_active ? 'badge-done' : 'badge-todo'}`}>
                  {u.is_active ? 'active' : 'inactive'}
                </span>
                <span className="tag" style={{ fontFamily:'var(--mono)', fontSize:11 }}>
                  {new Date(u.created_at).toLocaleDateString()}
                </span>
                <button className={`btn ${u.is_active ? 'btn-danger' : 'btn-success'}`}
                  style={{ padding:'6px 12px', fontSize:12 }}
                  onClick={() => toggleActive(u)}>
                  {u.is_active ? 'Deactivate' : 'Activate'}
                </button>
              </div>
            ))}
          </div>
        </div>
      );
    };

    // ─── DASHBOARD ────────────────────────────────────────────────
    const Dashboard = () => {
      const { token, user } = useAuth();
      const [stats, setStats] = useState({ todo:0, in_progress:0, done:0, total:0 });
      const [recentTasks, setRecentTasks] = useState([]);

      useEffect(() => {
        if (user.role === 'admin') {
          api.get('/tasks/stats', token).then(d => setStats(d.data.stats)).catch(()=>{});
        }
        api.get('/tasks?limit=5', token).then(d => setRecentTasks(d.data || [])).catch(()=>{});
      }, [token, user]);

      return (
        <div className="content">
          <div className="page-header">
            <div>
              <div className="page-title">Welcome back, {user.name.split(' ')[0]} 👋</div>
              <div className="page-sub">{new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' })}</div>
            </div>
          </div>

          {user.role === 'admin' && (
            <div className="stats-grid">
              {[
                { label:'Total Tasks',   value: stats.total,       cls:'purple' },
                { label:'To Do',         value: stats.todo,        cls:'cyan'   },
                { label:'In Progress',   value: stats.in_progress, cls:'orange' },
                { label:'Completed',     value: stats.done,        cls:'green'  },
              ].map(s => (
                <div key={s.label} className={`stat-card ${s.cls}`}>
                  <div className="stat-num">{s.value}</div>
                  <div className="stat-label">{s.label}</div>
                </div>
              ))}
            </div>
          )}

          <div className="card">
            <div className="card-header">
              <span className="card-title">Recent Tasks</span>
            </div>
            {recentTasks.length === 0
              ? <p style={{ color:'var(--muted)', fontSize:14 }}>No tasks yet — go create one!</p>
              : <div className="task-list">
                  {recentTasks.map(t => (
                    <div key={t.id} className="task-row" style={{ padding:'12px 16px' }}>
                      <div style={{ flex:1 }}>
                        <div className="task-title" style={{ fontSize:14 }}>{t.title}</div>
                      </div>
                      <Badge type={t.priority}/>
                      <Badge type={t.status} label={t.status.replace('_',' ')}/>
                    </div>
                  ))}
                </div>
            }
          </div>

          <div className="card" style={{ marginTop:20 }}>
            <div className="card-header"><span className="card-title">API Documentation</span></div>
            <p style={{ color:'var(--muted)', fontSize:14, lineHeight:1.6 }}>
              The backend exposes a fully documented REST API. Visit the Swagger UI to explore all endpoints.
            </p>
            <a href="http://localhost:5000/api-docs" target="_blank" rel="noreferrer"
              className="btn btn-primary" style={{ marginTop:16, display:'inline-flex' }}>
              Open API Docs →
            </a>
          </div>
        </div>
      );
    };

    // ─── MAIN APP ─────────────────────────────────────────────────
    const AppShell = () => {
      const { user, logout } = useAuth();
      const [page, setPage] = useState('dashboard');

      const nav = [
        { id:'dashboard', icon:'⬛', label:'Dashboard' },
        { id:'tasks',     icon:'✅', label:'Tasks'     },
        { id:'profile',   icon:'👤', label:'Profile'  },
        ...(user.role === 'admin' ? [{ id:'admin', icon:'🛡', label:'Users (Admin)' }] : []),
      ];

      const pages = { dashboard: <Dashboard/>, tasks: <TasksPage/>, profile: <ProfilePage/>, admin: <AdminPage/> };

      return (
        <div className="app">
          <aside className="sidebar">
            <div className="logo">
              <h1><span>Task</span>Flow</h1>
              <small>v1.0.0 · REST API Demo</small>
            </div>

            <div className="section-title">Menu</div>
            {nav.map(n => (
              <div key={n.id} className={`nav-item ${page === n.id ? 'active' : ''}`}
                onClick={() => setPage(n.id)}>
                <span className="nav-icon">{n.icon}</span>
                {n.label}
              </div>
            ))}

            <div className="sidebar-footer">
              <div className="user-chip">
                <div className="avatar">{user.name[0].toUpperCase()}</div>
                <div className="user-info">
                  <div className="user-name">{user.name}</div>
                  <div className="user-role">{user.role}</div>
                </div>
                <button onClick={logout} title="Sign out"
                  style={{ background:'none', border:'none', color:'var(--muted)', cursor:'pointer', fontSize:16 }}>
                  ↗
                </button>
              </div>
            </div>
          </aside>

          <main className="main">
            <div className="topbar">
              <div style={{ fontSize:14, fontWeight:700, color:'var(--muted)' }}>
                {nav.find(n => n.id === page)?.label}
              </div>
              <div style={{ display:'flex', alignItems:'center', gap:12 }}>
                <Badge type={user.role}/>
                <button className="btn btn-ghost" style={{ padding:'6px 14px', fontSize:13 }} onClick={logout}>
                  Sign out
                </button>
              </div>
            </div>
            {pages[page] || <Dashboard/>}
          </main>
        </div>
      );
    };

    const App = () => {
      const { user, loading } = useAuth();

      if (loading) {
        return (
          <div style={{ height:'100vh', display:'flex', alignItems:'center', justifyContent:'center' }}>
            <Spinner/>
          </div>
        );
      }

      return user ? <AppShell/> : <AuthPage/>;
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
      <AuthProvider>
        <App/>
      </AuthProvider>
    );
  </script>
</body>
</html>
