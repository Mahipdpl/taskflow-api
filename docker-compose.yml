version: '3.9'

services:
  # ── PostgreSQL ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: taskflow_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       taskflow_db
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: taskflow_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (optional caching) ────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: taskflow_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save 20 1 --loglevel warning
    volumes:
      - redisdata:/data

  # ── API Backend ─────────────────────────────────────────────────
  api:
    build: ./backend
    container_name: taskflow_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV:              production
      PORT:                  5000
      DB_HOST:               postgres
      DB_PORT:               5432
      DB_NAME:               taskflow_db
      DB_USER:               postgres
      DB_PASSWORD:           taskflow_secret
      JWT_SECRET:            replace_with_strong_secret_32_chars_minimum
      JWT_REFRESH_SECRET:    replace_with_strong_refresh_secret_32_chars
      JWT_EXPIRES_IN:        15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN:           http://localhost:3000
      REDIS_URL:             redis://redis:6379
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
  redisdata:
